{% extends "portal/teacher/base.html" %}

{% block title %}Edit Teacher{% endblock %}

{% block content %}
<div class="mb-6">
    <a href="{% url 'portal:teacher_list' %}" class="inline-flex items-center gap-1 text-xs font-semibold text-emerald-600 hover:text-emerald-700 mb-2">
        <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"/></svg>
        Back to Teachers
    </a>
    <h2 class="text-xl font-extrabold text-gray-900">Edit Teacher</h2>
    <p class="mt-1 text-sm text-gray-500">Update teacher details and class assignments</p>
</div>

<div class="max-w-xl">
    <div class="rounded-2xl bg-white p-6 shadow-sm border border-gray-100">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-wider text-gray-500 mb-1.5">First Name</label>
                        <input type="text" name="first_name" value="{{ teacher_obj.first_name }}" required class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 text-sm font-medium focus:border-emerald-400 focus:ring-2 focus:ring-emerald-100 outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-wider text-gray-500 mb-1.5">Last Name</label>
                        <input type="text" name="last_name" value="{{ teacher_obj.last_name }}" required class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 text-sm font-medium focus:border-emerald-400 focus:ring-2 focus:ring-emerald-100 outline-none">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-wider text-gray-500 mb-1.5">Gender</label>
                        <select name="gender" class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 text-sm font-medium focus:border-emerald-400 focus:ring-2 focus:ring-emerald-100 outline-none">
                            <option value="MALE" {% if teacher_obj.gender == "MALE" %}selected{% endif %}>Male</option>
                            <option value="FEMALE" {% if teacher_obj.gender == "FEMALE" %}selected{% endif %}>Female</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-wider text-gray-500 mb-1.5">Date of Birth</label>
                        <input type="date" name="date_of_birth" value="{{ teacher_obj.date_of_birth|date:'Y-m-d' }}" class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 text-sm font-medium focus:border-emerald-400 focus:ring-2 focus:ring-emerald-100 outline-none">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-wider text-gray-500 mb-1.5">Phone</label>
                        <input type="tel" name="phone" value="{{ teacher_obj.phone|default:'' }}" class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 text-sm font-medium focus:border-emerald-400 focus:ring-2 focus:ring-emerald-100 outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-wider text-gray-500 mb-1.5">Email</label>
                        <input type="email" name="email" value="{{ teacher_obj.email|default:'' }}" class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 text-sm font-medium focus:border-emerald-400 focus:ring-2 focus:ring-emerald-100 outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-gray-500 mb-1.5">Address</label>
                    <input type="text" name="address" value="{{ teacher_obj.address|default:'' }}" class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 text-sm font-medium focus:border-emerald-400 focus:ring-2 focus:ring-emerald-100 outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-wider text-gray-500 mb-1.5">Experience</label>
                        <input type="text" name="experience" value="{{ teacher_obj.experience|default:'' }}" class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 text-sm font-medium focus:border-emerald-400 focus:ring-2 focus:ring-emerald-100 outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-wider text-gray-500 mb-1.5">Qualifications</label>
                        <input type="text" name="qualifications" value="{{ teacher_obj.qualifications|default:'' }}" class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 text-sm font-medium focus:border-emerald-400 focus:ring-2 focus:ring-emerald-100 outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-gray-500 mb-1.5">Assign Classes</label>
                    <div class="flex flex-wrap gap-2">
                        {% for cls in classes %}
                        <label class="inline-flex items-center gap-1.5 rounded-lg border border-gray-200 px-3 py-2 text-xs font-medium text-gray-700 hover:bg-gray-50 cursor-pointer">
                            <input type="checkbox" name="classes" value="{{ cls.id }}" {% if cls.id in assigned_class_ids %}checked{% endif %}
                                class="rounded border-gray-300 text-emerald-600 focus:ring-emerald-500">
                            {{ cls.name }}
                        </label>
                        {% endfor %}
                    </div>
                </div>
            </div>
            <div class="mt-6 flex gap-3">
                <a href="{% url 'portal:teacher_list' %}" class="flex-1 text-center rounded-xl border border-gray-200 px-4 py-3 text-sm font-bold text-gray-700 hover:bg-gray-50 transition">Cancel</a>
                <button type="submit" class="flex-1 rounded-xl bg-emerald-600 px-4 py-3 text-sm font-bold text-white hover:bg-emerald-700 transition">Save Changes</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
