{% extends "portal/teacher/base.html" %}

{% block title %}Term Settings{% endblock %}

{% block content %}
<div class="mb-6">
    <h2 class="text-xl font-extrabold text-gray-900">Terminal Settings</h2>
    <p class="mt-1 text-sm text-gray-500">Configure the current term dates and school calendar</p>
</div>

<div class="max-w-xl">
    <div class="rounded-2xl bg-white p-6 shadow-sm border border-gray-100">
        <form method="post">
            {% csrf_token %}

            <!-- Term Selector -->
            <div class="mb-6">
                <label class="block text-[10px] font-bold uppercase tracking-wider text-gray-500 mb-1.5">Active Term</label>
                <select name="term_id" class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 text-sm font-medium focus:border-emerald-400 focus:ring-2 focus:ring-emerald-100 outline-none transition">
                    {% for t in terms %}
                    <option value="{{ t.id }}" {% if t.id == active_term.id %}selected{% endif %}>
                        {{ t.session.session_name }} &mdash; Term {{ t.term }} {% if t.is_active %}(Active){% endif %}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-gray-500 mb-1.5">Term Begins</label>
                    <input type="date" name="start_date" value="{{ selected_term.start_date|date:'Y-m-d' }}"
                        class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 text-sm font-medium focus:border-emerald-400 focus:ring-2 focus:ring-emerald-100 outline-none transition">
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-gray-500 mb-1.5">Term Ends</label>
                    <input type="date" name="end_date" value="{{ selected_term.end_date|date:'Y-m-d' }}"
                        class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 text-sm font-medium focus:border-emerald-400 focus:ring-2 focus:ring-emerald-100 outline-none transition">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-gray-500 mb-1.5">No. of Times School Opens</label>
                    <input type="number" name="school_days" value="{{ selected_term.school_days|default:'' }}" placeholder="e.g. 64"
                        class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 text-sm font-medium focus:border-emerald-400 focus:ring-2 focus:ring-emerald-100 outline-none transition">
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-gray-500 mb-1.5">Terminal Duration</label>
                    <div class="flex items-center h-12 px-4 rounded-xl bg-gray-100 border border-gray-200">
                        <span class="text-sm font-bold text-gray-700" id="duration">{{ term_duration|default:"—" }} days</span>
                    </div>
                </div>
            </div>

            <div class="mb-6">
                <label class="block text-[10px] font-bold uppercase tracking-wider text-gray-500 mb-1.5">Next Term Begins</label>
                <input type="date" name="next_term_begins" value="{{ selected_term.next_term_begins|date:'Y-m-d' }}"
                    class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 text-sm font-medium focus:border-emerald-400 focus:ring-2 focus:ring-emerald-100 outline-none transition">
            </div>

            <!-- Active term indicator -->
            <div class="mb-6 flex items-center gap-3">
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" name="is_active" {% if selected_term.is_active %}checked{% endif %} class="sr-only peer">
                    <div class="w-9 h-5 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-emerald-500"></div>
                </label>
                <span class="text-xs font-semibold text-gray-700">Set as Active Term</span>
            </div>

            <button type="submit" class="w-full rounded-xl bg-emerald-600 px-5 py-3 text-sm font-bold text-white hover:bg-emerald-700 transition shadow-sm shadow-emerald-200">
                Save Changes
            </button>
        </form>
    </div>
</div>

<script>
// Auto-calculate terminal duration
const startEl = document.querySelector('[name="start_date"]');
const endEl = document.querySelector('[name="end_date"]');
const durEl = document.getElementById('duration');
function calcDuration() {
    if (startEl.value && endEl.value) {
        const d = Math.ceil((new Date(endEl.value) - new Date(startEl.value)) / 86400000);
        durEl.textContent = d > 0 ? d + ' days' : '—';
    }
}
startEl.addEventListener('change', calcDuration);
endEl.addEventListener('change', calcDuration);
</script>
{% endblock %}
