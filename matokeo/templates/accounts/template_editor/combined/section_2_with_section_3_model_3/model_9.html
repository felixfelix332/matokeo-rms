{% load static %}
<div class="template-preview-s2m9-grid">
    <div class="template-preview-s2m9-content">
        <div class="template-preview-s2m9-pairs">
            <div class="template-preview-s2m9-pair">
                <div class="template-preview-s2m9-row" data-s2-row="name">
                    <div class="template-preview-s2m9-label">Name</div>
                    <div class="template-preview-s2m9-value" data-s2-value="name">John Doe Essien</div>
                </div>
                <div class="template-preview-s2m9-row" data-s2-row="date_of_birth">
                    <div class="template-preview-s2m9-label">Date Of Birth</div>
                    <div class="template-preview-s2m9-value" data-s2-value="date_of_birth">02/12/1992</div>
                </div>
            </div>
            <div class="template-preview-s2m9-pair">
                <div class="template-preview-s2m9-row" data-s2-row="sex">
                    <div class="template-preview-s2m9-label">Sex</div>
                    <div class="template-preview-s2m9-value" data-s2-value="sex">MALE</div>
                </div>
                <div class="template-preview-s2m9-row" data-s2-row="class_name">
                    <div class="template-preview-s2m9-label">Class</div>
                    <div class="template-preview-s2m9-value" data-s2-value="class_name"></div>
                </div>
            </div>
            <div class="template-preview-s2m9-pair">
                <div class="template-preview-s2m9-row" data-s2-row="admission_no">
                    <div class="template-preview-s2m9-label">Admission No.</div>
                    <div class="template-preview-s2m9-value" data-s2-value="admission_no">HG123</div>
                </div>
                <div class="template-preview-s2m9-row">
                    <div class="template-preview-s2m9-label">Terminal Duration</div>
                    <div class="template-preview-s2m9-value">45days</div>
                </div>
            </div>
            <div class="template-preview-s2m9-pair">
                <div class="template-preview-s2m9-row">
                    <div class="template-preview-s2m9-label">Term Begins</div>
                    <div class="template-preview-s2m9-value">01/01/2026</div>
                </div>
                <div class="template-preview-s2m9-row">
                    <div class="template-preview-s2m9-label">Term End</div>
                    <div class="template-preview-s2m9-value">01/03/2026</div>
                </div>
            </div>
            <div class="template-preview-s2m9-pair">
                <div class="template-preview-s2m9-row">
                    <div class="template-preview-s2m9-label">Next Term Begins</div>
                    <div class="template-preview-s2m9-value">23/04/2026</div>
                </div>
                <div class="template-preview-s2m9-row">
                    <div class="template-preview-s2m9-label">No. of Times Sch. Opened</div>
                    <div class="template-preview-s2m9-value">23</div>
                </div>
            </div>
            <div class="template-preview-s2m9-pair template-preview-s2m9-pair--single">
                <div class="template-preview-s2m9-row">
                    <div class="template-preview-s2m9-label">No. in Class</div>
                    <div class="template-preview-s2m9-value">13</div>
                </div>
            </div>
        </div>
        <div class="template-preview-avatar template-preview-s2m9-avatar">
            <img src="{% static 'accounts/images/student-icon.jpg' %}" alt="Student icon">
        </div>
    </div>
</div>
