{% load static %}
<div class="template-preview-s2m7-grid">
    <div class="template-preview-s2m7-column">
        <div class="template-preview-s2m7-row" data-s2-row="name">
            <div class="template-preview-s2m7-label">Name</div>
            <div class="template-preview-s2m7-value" data-s2-value="name">John Doe Essien</div>
        </div>
        <div class="template-preview-s2m7-row" data-s2-row="age">
            <div class="template-preview-s2m7-label">Age</div>
            <div class="template-preview-s2m7-value" data-s2-value="age">17</div>
        </div>
        <div class="template-preview-s2m7-row" data-s2-row="class_name">
            <div class="template-preview-s2m7-label">Class</div>
            <div class="template-preview-s2m7-value" data-s2-value="class_name"></div>
        </div>
        <div class="template-preview-s2m7-row" data-s2-row="class_teacher">
            <div class="template-preview-s2m7-label">Class Teacher</div>
            <div class="template-preview-s2m7-value" data-s2-value="class_teacher"></div>
        </div>
    </div>

    <div class="template-preview-s2m7-column">
        <div class="template-preview-s2m7-row" data-s2-row="date_of_birth">
            <div class="template-preview-s2m7-label">Date Of Birth</div>
            <div class="template-preview-s2m7-value" data-s2-value="date_of_birth">02/12/1992</div>
        </div>
        <div class="template-preview-s2m7-row" data-s2-row="sex">
            <div class="template-preview-s2m7-label">Sex</div>
            <div class="template-preview-s2m7-value" data-s2-value="sex">MALE</div>
        </div>
        <div class="template-preview-s2m7-row" data-s2-row="admission_no">
            <div class="template-preview-s2m7-label">Admission No.</div>
            <div class="template-preview-s2m7-value" data-s2-value="admission_no">HG123</div>
        </div>
        <div class="template-preview-s2m7-row">
            <div class="template-preview-s2m7-label">No. in Class</div>
            <div class="template-preview-s2m7-value">13</div>
        </div>
    </div>

    <div class="template-preview-avatar template-preview-s2m7-avatar">
        <img src="{% static 'accounts/images/student-icon.jpg' %}" alt="Student icon">
    </div>
</div>
