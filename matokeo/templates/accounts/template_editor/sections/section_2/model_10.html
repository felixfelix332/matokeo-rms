{% load static %}
<div class="template-preview-s2m10-grid">
    <div class="template-preview-s2m10-column">
        <div class="template-preview-s2m10-row" data-s2-row="name">
            <div class="template-preview-s2m10-label">Name</div>
            <div class="template-preview-s2m10-value" data-s2-value="name">John Doe Essien</div>
        </div>
        <div class="template-preview-s2m10-row" data-s2-row="sex">
            <div class="template-preview-s2m10-label">Sex</div>
            <div class="template-preview-s2m10-value" data-s2-value="sex">MALE</div>
        </div>
        <div class="template-preview-s2m10-row" data-s2-row="admission_no">
            <div class="template-preview-s2m10-label">Admission No.</div>
            <div class="template-preview-s2m10-value" data-s2-value="admission_no">HG123</div>
        </div>
        <div class="template-preview-s2m10-row">
            <div class="template-preview-s2m10-label">Total Score Obtained</div>
            <div class="template-preview-s2m10-value">884</div>
        </div>
        <div class="template-preview-s2m10-row">
            <div class="template-preview-s2m10-label">Position</div>
            <div class="template-preview-s2m10-value">12th</div>
        </div>
    </div>

    <div class="template-preview-s2m10-column">
        <div class="template-preview-s2m10-row" data-s2-row="date_of_birth">
            <div class="template-preview-s2m10-label">Date Of Birth</div>
            <div class="template-preview-s2m10-value" data-s2-value="date_of_birth">02/12/1992</div>
        </div>
        <div class="template-preview-s2m10-row" data-s2-row="class_name">
            <div class="template-preview-s2m10-label">Class</div>
            <div class="template-preview-s2m10-value" data-s2-value="class_name"></div>
        </div>
        <div class="template-preview-s2m10-row">
            <div class="template-preview-s2m10-label">Total Score Obtainable</div>
            <div class="template-preview-s2m10-value">1300</div>
        </div>
        <div class="template-preview-s2m10-row">
            <div class="template-preview-s2m10-label">Average Percentage</div>
            <div class="template-preview-s2m10-value">68.0</div>
        </div>
        <div class="template-preview-s2m10-row">
            <div class="template-preview-s2m10-label">No. in Class</div>
            <div class="template-preview-s2m10-value">13</div>
        </div>
    </div>

    <div class="template-preview-avatar template-preview-s2m10-avatar">
        <img src="{% static 'accounts/images/student-icon.jpg' %}" alt="Student icon">
    </div>
</div>
